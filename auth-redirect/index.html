<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Winkly…</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #F9F7FB; color: #1C1C1E; }
    .spinner { width: 48px; height: 48px; border: 4px solid #E5E5EA; border-top-color: #5A189A; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; color: #555; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Opening Winkly app…</p>
  <script>
    (function() {
      var hash = window.location.hash;
      var search = window.location.search;
      var fragment = hash || (search ? '#' + search.replace(/^\?/, '') : '');
      if (fragment && fragment.indexOf('access_token') !== -1) {
        window.location.replace('winkly://callback' + fragment);
        setTimeout(function() {
          document.body.innerHTML = '<p>If Winkly didn\'t open, <a href="winkly://callback' + fragment + '">tap here</a> or open the app manually and sign in.</p>';
        }, 2500);
      } else {
        document.body.innerHTML = '<p>This link may have expired.</p><p><a href="winkly://">Open Winkly</a> and sign in to continue.</p>';
      }
    })();
  </script>
</body>
</html>
