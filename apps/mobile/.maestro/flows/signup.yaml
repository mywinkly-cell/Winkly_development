# Flow: account creation (Personal account via email).
appId: com.winkly.app
env:
  EMAIL: "qa@winkly.test"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true
- assertVisible:
    text: "Winkly"
    optional: true

# Navigate from splash/welcome to the signup screen. These taps are optional
# so the flow still works if the user lands directly on an auth screen.
- tapOn:
    text: "Get started"
    optional: true
- tapOn:
    text: "Sign up"
    optional: true
- tapOn:
    text: "Create account"
    optional: true

# Signup screen (testIDs preferred; text fallbacks for older builds)
- assertVisible:
    id: "signup-screen"
    optional: true
- assertVisible: "Create your account"
- tapOn:
    id: "signup-account-personal"
    optional: true
- tapOn:
    text: "Personal"
    optional: true
- tapOn:
    id: "signup-email"
    optional: true
- tapOn:
    text: "name@example.com"
    optional: true
- inputText: "${EMAIL}"
- tapOn:
    id: "signup-password"
    optional: true
- tapOn:
    below: "Password"
    optional: true
- inputText: "${PASSWORD}"
- hideKeyboard
- tapOn:
    id: "signup-submit"
    optional: true
- tapOn: "Create account"

# Either a verification screen or the onboarding entry should appear.
- assertVisible:
    text: ".*([Vv]erify|[Cc]heck your email|What would you like|Set up).*"
    optional: true
